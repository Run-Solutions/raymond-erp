services:
  postgres:
    image: postgres:15-alpine
    container_name: raymond-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-raymond}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-raymond_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - raymond-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-raymond} -d ${DB_NAME:-raymond_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: raymond-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - raymond-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      platforms:
        - linux/amd64
    container_name: raymond-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8001}:8001"
    environment:
      NODE_ENV: production
      PORT: 8001
      DATABASE_URL: postgresql://${DB_USER:-raymond}:${DB_PASSWORD}@raymond-postgres:5432/${DB_NAME:-raymond_db}
      TALLER_R1_DATABASE_URL: ${TALLER_R1_DATABASE_URL}
      FRONTERA_DATABASE_URL: ${FRONTERA_DATABASE_URL}
      NAVES_DATABASE_URL: ${NAVES_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8000}
      REDIS_HOST: raymond-redis
      REDIS_PORT: 6379
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - raymond-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      platforms:
        - linux/amd64
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001/api}
    container_name: raymond-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001/api}
    depends_on:
      - api
    networks:
      - raymond-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  raymond-network:
    driver: bridge

