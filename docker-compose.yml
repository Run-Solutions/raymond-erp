version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: raymond-api
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://${DB_USER:-raymond}:${DB_PASSWORD:-raymond_password}@raymond-postgres:5432/${DB_NAME:-raymond_db}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - API_PORT=${API_PORT:-8001}
      - PORT=${PORT:-8001}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - SUPER_ADMIN_EMAILS=${SUPER_ADMIN_EMAILS}
      - ENABLE_SWAGGER=${ENABLE_SWAGGER:-true}
      - REDIS_HOST=raymond-redis
      - REDIS_PORT=6379
      - TALLER_R1_DATABASE_URL=${TALLER_R1_DATABASE_URL}
      - FRONTERA_DATABASE_URL=${FRONTERA_DATABASE_URL}
      - NAVES_DATABASE_URL=${NAVES_DATABASE_URL}
    restart: unless-stopped
    networks:
      - raymond-network

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001/api
    container_name: raymond-web
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - raymond-network

  redis:
    image: redis:7-alpine
    container_name: raymond-redis
    ports:
      - "6381:6379"
    networks:
      - raymond-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: raymond-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-raymond}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-raymond_password}
      - POSTGRES_DB=${DB_NAME:-raymond_db}
    ports:
      - "5434:5432"
    networks:
      - raymond-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-raymond} -d ${DB_NAME:-raymond_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  raymond-network:
    driver: bridge

