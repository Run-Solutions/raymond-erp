version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: raymond-api
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
    restart: unless-stopped
    networks:
      - raymond-network

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://api:8001/api
    container_name: raymond-web
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - raymond-network

networks:
  raymond-network:
    driver: bridge
